<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <filter id="sheetShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="-8" stdDeviation="18" flood-color="#12323A" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7FBFA"/>
      <stop offset="100%" stop-color="#EEF7FE"/>
    </linearGradient>
    <linearGradient id="fadeTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="58%" stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="42%" stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.98"/>
    </linearGradient>
    <style>
      .title { font: 600 34px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #12323A; }
      .subtitle { font: 400 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3E5B63; }
      .note { font: 500 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #247BA0; }
      .phone-title { font: 600 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #12323A; }
      .phone-subtitle { font: 400 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3E5B63; }
      .nav { font: 500 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #B8526C; }
      .nav-boy { font: 500 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2A74B8; }
      .sheet-title { font: 600 19px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #12323A; }
      .item { font: 400 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #12323A; }
      .item-weak { font: 400 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #7C98A1; }
      .item-selected { font: 600 19px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #B8526C; }
      .dt-faint { font: 400 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #D2DCDF; }
      .dt { font: 400 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9AAAB0; }
      .dt-near { font: 400 19px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #70858D; }
      .dt-selected { font: 600 23px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #12323A; }
      .label { font: 600 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3E5B63; }
    </style>
  </defs>

  <rect width="1440" height="980" fill="url(#pageBg)"/>
  <text x="72" y="74" class="title">BabyCare Picker 最终视觉方向：列表整体感 + 渐变突出选中行</text>
  <text x="72" y="112" class="subtitle">选择弹框用列表分割线和右侧勾；时间弹框用平面多列滚动，上下渐变蒙层弱化非选中内容。</text>
  <text x="72" y="148" class="note">关键差异：无 3D 透视、无缩放、无描边选中块；选中数字在中心区域保持清晰，周围数字自然淡出。</text>

  <!-- Choice picker -->
  <g transform="translate(72,198)">
    <text x="0" y="-22" class="phone-title">选择弹框</text>
    <text x="0" y="4" class="phone-subtitle">item 下划线 + 右侧对勾</text>
    <rect x="0" y="24" width="382" height="720" rx="36" fill="#E7F0F2"/>
    <rect x="14" y="38" width="354" height="692" rx="30" fill="#F7FBFA"/>
    <text x="48" y="98" class="label">设置</text>
    <rect x="42" y="130" width="298" height="138" rx="16" fill="#FFFFFF" stroke="#E3ECEB"/>
    <text x="66" y="168" class="item">喂养单位</text>
    <text x="280" y="168" class="item-weak">ml</text>
    <line x1="66" y1="194" x2="316" y2="194" stroke="#E3ECEB"/>
    <text x="66" y="220" class="item">体重单位</text>
    <text x="280" y="220" class="item-weak">kg</text>
    <line x1="66" y1="246" x2="316" y2="246" stroke="#E3ECEB"/>
    <text x="66" y="272" class="item">身高单位</text>
    <text x="280" y="272" class="item-weak">cm</text>

    <rect x="14" y="306" width="354" height="424" rx="28" fill="#FFFFFF" filter="url(#sheetShadow)"/>
    <rect x="152" y="322" width="64" height="5" rx="2.5" fill="#D8E5E3"/>
    <text x="48" y="370" class="nav">取消</text>
    <text x="178" y="370" text-anchor="middle" class="sheet-title">身高单位</text>
    <text x="310" y="370" text-anchor="end" class="nav">完成</text>
    <line x1="30" y1="398" x2="352" y2="398" stroke="#E3ECEB"/>
    <text x="48" y="448" class="item-selected">cm</text>
    <path d="M305 442l8 8 18-20" fill="none" stroke="#B8526C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="48" y1="474" x2="334" y2="474" stroke="#E3ECEB"/>
    <text x="48" y="524" class="item">in</text>
    <line x1="48" y1="550" x2="334" y2="550" stroke="#E3ECEB"/>
    <text x="48" y="600" class="item">ft</text>
    <line x1="48" y1="626" x2="334" y2="626" stroke="#E3ECEB"/>
    <text x="48" y="674" class="phone-subtitle">选中态融入列表，不再出现孤立描边块</text>
  </g>

  <!-- Date time picker with fade -->
  <g transform="translate(529,198)">
    <text x="0" y="-22" class="phone-title">日期时间弹框</text>
    <text x="0" y="4" class="phone-subtitle">多列平面滚动 + 上下渐变蒙层</text>
    <rect x="0" y="24" width="382" height="720" rx="36" fill="#E7F0F2"/>
    <rect x="14" y="38" width="354" height="692" rx="30" fill="#F7FBFA"/>
    <text x="132" y="98" class="label">创建宝宝</text>
    <rect x="42" y="130" width="298" height="240" rx="18" fill="#FFFFFF" stroke="#E3ECEB"/>
    <text x="66" y="168" class="label">生日</text>
    <rect x="66" y="188" width="250" height="48" rx="8" fill="#FFFDFC" stroke="#E3ECEB"/>
    <text x="84" y="219" class="item-weak">请选择生日</text>
    <text x="66" y="280" class="label">性别</text>
    <rect x="66" y="300" width="250" height="48" rx="8" fill="#FFFDFC" stroke="#E3ECEB"/>
    <text x="84" y="331" class="item-weak">请选择性别</text>

    <rect x="14" y="306" width="354" height="424" rx="28" fill="#FFFFFF" filter="url(#sheetShadow)"/>
    <rect x="152" y="322" width="64" height="5" rx="2.5" fill="#D8E5E3"/>
    <text x="48" y="370" class="nav">取消</text>
    <text x="178" y="370" text-anchor="middle" class="sheet-title">生日</text>
    <text x="310" y="370" text-anchor="end" class="nav">完成</text>
    <line x1="30" y1="398" x2="352" y2="398" stroke="#E3ECEB"/>

    <!-- Center selection rails -->
    <line x1="36" y1="520" x2="346" y2="520" stroke="#E3ECEB"/>
    <line x1="36" y1="574" x2="346" y2="574" stroke="#E3ECEB"/>

    <!-- Picker text -->
    <g transform="translate(52,442)">
      <text x="0" y="0" class="dt-faint">2024年</text>
      <text x="0" y="48" class="dt">2025年</text>
      <text x="0" y="110" class="dt-selected">2026年</text>
      <text x="0" y="166" class="dt">2027年</text>
      <text x="0" y="214" class="dt-faint">2028年</text>
    </g>
    <g transform="translate(126,442)">
      <text x="0" y="0" class="dt-faint">03月</text>
      <text x="0" y="48" class="dt">04月</text>
      <text x="0" y="110" class="dt-selected">05月</text>
      <text x="0" y="166" class="dt">06月</text>
      <text x="0" y="214" class="dt-faint">07月</text>
    </g>
    <g transform="translate(192,442)">
      <text x="0" y="0" class="dt-faint">14日</text>
      <text x="0" y="48" class="dt">15日</text>
      <text x="0" y="110" class="dt-selected">16日</text>
      <text x="0" y="166" class="dt">17日</text>
      <text x="0" y="214" class="dt-faint">18日</text>
    </g>
    <g transform="translate(257,442)">
      <text x="0" y="0" class="dt-faint">18时</text>
      <text x="0" y="48" class="dt">19时</text>
      <text x="0" y="110" class="dt-selected">20时</text>
      <text x="0" y="166" class="dt">21时</text>
      <text x="0" y="214" class="dt-faint">22时</text>
    </g>
    <g transform="translate(315,442)">
      <text x="0" y="0" class="dt-faint">14分</text>
      <text x="0" y="48" class="dt">15分</text>
      <text x="0" y="110" class="dt-selected">16分</text>
      <text x="0" y="166" class="dt">17分</text>
      <text x="0" y="214" class="dt-faint">18分</text>
    </g>

    <!-- Gradient masks sit above the whole picker area, leaving center visible -->
    <rect x="28" y="400" width="326" height="116" fill="url(#fadeTop)"/>
    <rect x="28" y="578" width="326" height="116" fill="url(#fadeBottom)"/>
    <line x1="36" y1="520" x2="346" y2="520" stroke="#E3ECEB"/>
    <line x1="36" y1="574" x2="346" y2="574" stroke="#E3ECEB"/>
    <text x="30" y="698" class="phone-subtitle">渐变覆盖整块滚动内容，只突出中心数字</text>
  </g>

  <!-- Time only picker with fade -->
  <g transform="translate(986,198)">
    <text x="0" y="-22" class="phone-title">时间弹框</text>
    <text x="0" y="4" class="phone-subtitle">时 / 分双列，和日期时间同一语言</text>
    <rect x="0" y="24" width="382" height="720" rx="36" fill="#E7F0F2"/>
    <rect x="14" y="38" width="354" height="692" rx="30" fill="#F7FBFA"/>
    <text x="132" y="98" class="label">记录喂养</text>
    <rect x="42" y="132" width="298" height="88" rx="16" fill="#FFFFFF" stroke="#E3ECEB"/>
    <text x="66" y="168" class="label">开始时间</text>
    <text x="228" y="170" class="item">20:16</text>
    <rect x="42" y="238" width="298" height="88" rx="16" fill="#FFFFFF" stroke="#E3ECEB"/>
    <text x="66" y="274" class="label">结束时间</text>
    <text x="228" y="276" class="item">20:42</text>

    <rect x="14" y="336" width="354" height="394" rx="28" fill="#FFFFFF" filter="url(#sheetShadow)"/>
    <rect x="152" y="352" width="64" height="5" rx="2.5" fill="#D8E5E3"/>
    <text x="48" y="400" class="nav-boy">取消</text>
    <text x="178" y="400" text-anchor="middle" class="sheet-title">开始时间</text>
    <text x="310" y="400" text-anchor="end" class="nav-boy">完成</text>
    <line x1="30" y1="428" x2="352" y2="428" stroke="#E3ECEB"/>

    <line x1="80" y1="544" x2="302" y2="544" stroke="#E3ECEB"/>
    <line x1="80" y1="598" x2="302" y2="598" stroke="#E3ECEB"/>
    <g transform="translate(120,468)">
      <text x="0" y="0" class="dt-faint">18</text>
      <text x="0" y="50" class="dt-near">19</text>
      <text x="-1" y="114" class="dt-selected">20</text>
      <text x="0" y="170" class="dt-near">21</text>
      <text x="0" y="220" class="dt-faint">22</text>
    </g>
    <g transform="translate(230,468)">
      <text x="0" y="0" class="dt-faint">14</text>
      <text x="0" y="50" class="dt-near">15</text>
      <text x="-1" y="114" class="dt-selected">16</text>
      <text x="0" y="170" class="dt-near">17</text>
      <text x="0" y="220" class="dt-faint">18</text>
    </g>
    <text x="177" y="584" class="dt-selected">:</text>

    <rect x="72" y="430" width="238" height="110" fill="url(#fadeTop)"/>
    <rect x="72" y="604" width="238" height="98" fill="url(#fadeBottom)"/>
    <line x1="80" y1="544" x2="302" y2="544" stroke="#E3ECEB"/>
    <line x1="80" y1="598" x2="302" y2="598" stroke="#E3ECEB"/>
    <text x="42" y="704" class="phone-subtitle">滚动时上下数字被遮罩自然淡出</text>
  </g>

  <g transform="translate(72,910)">
    <rect x="0" y="-34" width="1296" height="54" rx="16" fill="#FFFFFF" stroke="#E3ECEB"/>
    <text x="24" y="0" class="subtitle">落地建议：时间列使用 RecyclerView/NumberPicker 的平面滚动能力，外层叠加上下渐变 View；中心行用两条 hairline 分割线固定，不给 item 加描边背景。</text>
  </g>
</svg>
